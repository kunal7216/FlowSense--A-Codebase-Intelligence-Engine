spring:
  application:
    name: flowsense-core

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/flowsense
    username: flowsense
    password: flowsense123

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Neo4j
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: flowsense123

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: flowsense-analysis-group
      auto-offset-reset: earliest
      enable-auto-commit: false

  # Spring AI - Ollama (FREE - no API key needed!)
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: codellama:13b        # Best for Java code understanding
        options:
          temperature: 0.1          # Low = more deterministic answers
          num-ctx: 8192             # Context window
          top-p: 0.9
          repeat-penalty: 1.1      # Avoid repetition
      embedding:
        model: nomic-embed-text     # FREE 768-dim embeddings

# JWT
jwt:
  secret: flowsense-super-secret-key-change-in-production-must-be-256-bits
  expiration: 86400000

# Server
server:
  port: 8080

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,kafka
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.flowsense: DEBUG
    org.springframework.ai: INFO
    org.springframework.kafka: WARN
    org.neo4j: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# FlowSense config
flowsense:
  github:
    webhook-secret: flowsense-webhook-secret  # Must match GitHub webhook secret
    token: ""                                  # Optional: GitHub PAT for posting comments
  parser:
    max-file-size-mb: 10
    supported-extensions:
      - .java
  embedding:
    batch-size: 50
    cache-ttl-hours: 24
  graph:
    max-depth: 10
  rag:
    max-context-chars: 6000
    min-similarity-threshold: 0.6
    max-semantic-results: 8
    max-conversation-turns: 10
