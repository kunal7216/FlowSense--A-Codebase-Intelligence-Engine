version: '3.8'

# FlowSense Pro - Phase 1 Infrastructure
# Run: docker-compose up -d
# Stop: docker-compose down

services:

  # ── Neo4j Graph Database ──────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: flowsense-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (open in browser)
      - "7687:7687"   # Bolt protocol (Spring connects here)
    environment:
      NEO4J_AUTH: neo4j/flowsense123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - flowsense-net

  # ── PostgreSQL + pgvector ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flowsense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flowsense
      POSTGRES_USER: flowsense
      POSTGRES_PASSWORD: flowsense123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsense"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowsense-net

  # ── Redis Cache ───────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: flowsense-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - flowsense-net

# NOTE: Ollama runs NATIVELY on Windows (not in Docker)
# Install from: https://ollama.com/download/windows
# Then run: ollama pull codellama:13b
#           ollama pull nomic-embed-text
#           ollama serve

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:

networks:
  flowsense-net:
    driver: bridge
