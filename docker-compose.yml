version: '3.8'

# FlowSense Pro - Phase 2 Infrastructure
# Adds Kafka + Zookeeper to Phase 1 stack
# Run: docker-compose up -d
# Stop: docker-compose down

services:

  # ── Neo4j ─────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18.0
    container_name: flowsense-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/flowsense123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - flowsense-net

  # ── PostgreSQL + pgvector ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: flowsense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flowsense
      POSTGRES_USER: flowsense
      POSTGRES_PASSWORD: flowsense123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsense"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowsense-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: flowsense-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - flowsense-net

  # ── Zookeeper (required by Kafka) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: flowsense-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowsense-net

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: flowsense-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_RETENTION_HOURS: 168        # Keep events 7 days
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - flowsense-net

  # ── Kafka UI (dev tool - visualize topics) ────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: flowsense-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"     # Open http://localhost:8090 to see Kafka topics
    environment:
      KAFKA_CLUSTERS_0_NAME: flowsense
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - flowsense-net

# NOTE: Ollama runs NATIVELY on Windows (not in Docker)
# ollama serve must be running separately

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:

networks:
  flowsense-net:
    driver: bridge
